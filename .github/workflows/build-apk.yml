name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'bridge-of-voices/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge-of-voices

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platforms;android-33'

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties 2>/dev/null || true

      - name: Install Dependencies
        run: npm install

      - name: Sync Web Assets
        run: npm run www

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-of-voices-apk
          path: bridge-of-voices/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
