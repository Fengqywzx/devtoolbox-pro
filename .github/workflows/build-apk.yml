name: Build APK with Cordova

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with: { node-version: '20' }

    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        mkdir -p /tmp/apk-build
        cd /tmp/apk-build
        cordova create bridge com.wanzixuan.bridgeofvoices "声音的桥" --template blank

    - name: Copy Web Assets
      run: |
        rm -rf /tmp/apk-build/bridge/www/*
        cp -r bridge-of-voices/www/* /tmp/apk-build/bridge/www/
        echo "Files in www:" && ls /tmp/apk-build/bridge/www/

    - name: Add Android Platform
      working-directory: /tmp/apk-build/bridge
      run: cordova platform add android@13

    - name: Build APK
      working-directory: /tmp/apk-build/bridge
      run: cordova build android --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 声音的桥-v3.0.0
        path: /tmp/apk-build/bridge/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
