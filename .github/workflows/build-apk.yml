name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Accept licenses & create local.properties
        working-directory: bridge-of-voices
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install npm dependencies
        working-directory: bridge-of-voices
        run: npm install

      - name: Build Web Assets
        working-directory: bridge-of-voices
        run: npm run www

      - name: Sync Capacitor Android
        working-directory: bridge-of-voices
        run: npx cap sync android

      - name: Verify android project structure
        working-directory: bridge-of-voices
        run: |
          echo "=== gradle wrapper ===" && ls -la android/gradlew
          echo "=== capacitor android ===" && ls -la node_modules/@capacitor/android/capacitor/build.gradle 2>/dev/null || echo "MISSING"
          echo "=== capacitor settings ===" && cat android/capacitor.settings.gradle

      - name: Build APK with Gradle
        working-directory: bridge-of-voices/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80

      - name: Find and Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-of-voices-apk
          path: |
            bridge-of-voices/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
