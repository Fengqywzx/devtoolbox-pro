name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Copy Web Assets to APK project
        run: |
          cp -r bridge-of-voices/www/* bridge-of-voices/android-apk/app/src/main/assets/
          echo "Web assets copied. Files:"
          ls bridge-of-voices/android-apk/app/src/main/assets/ | head -10

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > bridge-of-voices/android-apk/local.properties

      - name: Build Debug APK
        working-directory: bridge-of-voices/android-apk
        run: |
          # Download gradle wrapper if needed
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.2.1
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 声音的桥-v3.0.0
          path: bridge-of-voices/android-apk/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
