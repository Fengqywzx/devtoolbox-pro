name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'bridge-of-voices/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge-of-voices

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Sync Web Assets
        run: npm run www

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-of-voices-apk
          path: bridge-of-voices/android/app/build/outputs/apk/debug/app-debug.apk
